<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register — Blood Donor Finder</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="page-register" data-page="register">
    <header class="site-header">
      <div class="container header-inner">
        <a class="logo" href="index.html">Blood Donor Finder</a>
        <nav class="nav">
          <a href="register.html" aria-current="page">Register</a>
          <a href="search.html">Find Donor</a>
        </nav>
      </div>
    </header>

    <main class="section">
      <div class="container narrow">
        <h1>Register as a donor</h1>
        <p class="muted">
          Your details will be stored securely and shown only in search results
          to people looking for donors.
        </p>

        <form id="register-form" class="card form-card" novalidate>
          <div id="form-alert" class="alert hidden" role="alert"></div>

          <label>
            Full name <span class="req">*</span>
            <input type="text" name="name" id="name" autocomplete="name" required />
            <span class="field-error" id="err-name"></span>
          </label>

          <label>
            Age <span class="req">*</span>
            <input
              type="number"
              name="age"
              id="age"
              min="18"
              max="120"
              inputmode="numeric"
              required
            />
            <span class="field-error" id="err-age"></span>
          </label>

          <label>
            Gender <span class="req">*</span>
            <select name="gender" id="gender" required>
              <option value="">Select gender</option>
              <option value="Male">Male</option>
              <option value="Female">Female</option>
              <option value="Other">Other</option>
            </select>
            <span class="field-error" id="err-gender"></span>
          </label>

          <label>
            Blood group <span class="req">*</span>
            <select name="bloodGroup" id="bloodGroup" required>
              <option value="">Select blood group</option>
              <option>A+</option>
              <option>A-</option>
              <option>B+</option>
              <option>B-</option>
              <option>AB+</option>
              <option>AB-</option>
              <option>O+</option>
              <option>O-</option>
            </select>
            <span class="field-error" id="err-bloodGroup"></span>
          </label>

          <label>
            Phone number <span class="req">*</span>
            <input
              type="tel"
              name="phone"
              id="phone"
              maxlength="10"
              inputmode="numeric"
              placeholder="10-digit mobile number"
              autocomplete="tel"
              required
            />
            <span class="field-error" id="err-phone"></span>
          </label>

          <label>
            City / location <span class="req">*</span>
            <input type="text" name="city" id="city" autocomplete="address-level2" required />
            <span class="field-error" id="err-city"></span>
          </label>

          <label>
            Last donation date <span class="optional">(optional)</span>
            <input type="date" name="lastDonationDate" id="lastDonationDate" />
            <span class="field-error" id="err-lastDonationDate"></span>
          </label>

          <div class="form-actions">
            <button type="submit" class="btn btn-primary">Submit registration</button>
            <a href="search.html" class="btn btn-ghost">Find donors</a>
          </div>
        </form>
      </div>
    </main>

    <footer class="site-footer">
      <div class="container">
        <p><a href="index.html">← Home</a></p>
      </div>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
